<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <!-- Belt-and-suspenders SPA fallback for GitHub Pages: any unknown deep path
         lands here on-brand and bounces home. The real pages (/ and /dashboard/)
         are emitted as real files by the multi-page build and never hit this. -->
    <meta http-equiv="refresh" content="4; url=/" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <title>re-forge — page not found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f8fa; --ink: #14161d; --ink-soft: #515968; --ink-faint: #8b909c;
        --line: #e6e8ee; --primary: #4f46e5; --primary-bright: #6d5dfc;
        --font-display: "Instrument Serif", Georgia, serif;
        --font-ui: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: var(--paper); color: var(--ink); font-family: var(--font-ui);
        display: grid; place-items: center; min-height: 100vh; padding: 24px;
        -webkit-font-smoothing: antialiased; text-align: center;
      }
      .mark {
        width: 40px; height: 40px; border-radius: 11px; background: var(--ink); color: #fff;
        display: grid; place-items: center; font-size: 20px; margin: 0 auto 22px;
        box-shadow: 0 2px 6px rgba(20, 22, 29, 0.2);
      }
      .eyebrow {
        font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px;
      }
      h1 {
        font-family: var(--font-display); font-weight: 400; font-size: clamp(38px, 7vw, 58px);
        letter-spacing: -0.025em; line-height: 1; margin: 0 0 14px;
      }
      p { color: var(--ink-soft); font-size: 16px; max-width: 46ch; margin: 0 auto 26px; line-height: 1.55; }
      .row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      a.btn {
        font-weight: 600; font-size: 14px; padding: 11px 20px; border-radius: 999px; text-decoration: none;
        background: var(--primary); color: #fff; border: 1px solid var(--primary);
        box-shadow: 0 2px 10px -2px rgba(79, 70, 229, 0.5); transition: background 0.15s;
      }
      a.btn:hover { background: var(--primary-bright); }
      a.btn.ghost { background: #fff; color: var(--ink); border-color: var(--line); box-shadow: none; }
      a.btn.ghost:hover { border-color: var(--ink-faint); }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">★</div>
      <div class="eyebrow">re-forge · 404</div>
      <h1>That page moved.</h1>
      <p>The link didn't resolve. Taking you back to re-forge — or jump straight in below.</p>
      <div class="row">
        <a class="btn" href="/">Back to re-forge</a>
        <a class="btn ghost" href="/dashboard/">Open the dashboard</a>
      </div>
    </main>
  </body>
</html>
