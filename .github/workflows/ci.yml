name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Harness (frontmatter, links, shell, catalog, install smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install shellcheck
        run: sudo apt-get update -q && sudo apt-get install -y -q shellcheck
      - name: Sync locked dev dependencies
        run: uv sync --locked --group dev
      - name: Run validation harness (includes install smoke test)
        run: uv run --group dev pytest -m "not external"
      - name: Catalog drift check
        run: uv run --group dev python scripts/build_catalog.py --check

  links-external:
    name: External link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Sync locked dev dependencies
        run: uv sync --locked --group dev
      - name: Check external URLs
        run: uv run --group dev pytest -m external

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: markdownlint-cli2
        run: npx -y markdownlint-cli2@0.22.1 "**/*.md"

  showcase:
    name: Showcase build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: showcase/package-lock.json
      - name: Locked install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
